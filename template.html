  <div class="card">
    <h1>제목</h1>
    위키피디아의 정의 : 데이터 시각화(data visualization)는 데이터 분석 결과를 쉽게 이해할 수 있도록 시각적으로 표현하고 전달되는 과정을 말한다.
    <br><br>
    목적 : 데이터 시각화의 목적은 <b>도표(graph)</b>라는 <b>수단</b>을 통해 <b>정보</b>를 <b>명확하고 효과적으로</b> 전달하는 것이다.
    <br><br><br>
    <div class="center">
      <i>"도표(graph)"&nbsp;&nbsp; / &nbsp;&nbsp;"정보"&nbsp;&nbsp; /&nbsp;&nbsp; "명확, 효과"</i>
    </div>
  </div>


  <div class="card">
    출처 : <a target="_blank" href="href=https://www.wikiwand.com/en/D3.js"><span>위키피디아</span></a>
